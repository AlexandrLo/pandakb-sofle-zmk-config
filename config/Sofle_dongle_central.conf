### SPLIT / DONGLE CONFIGURATION
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2

### LIGHTING CONFIGURATION
# RGB_TOG/HUE/EFF behaviors have BEHAVIOR_LOCALITY_GLOBAL: the central
# forwards them to every peripheral so the halves' real LED strips react,
# but only after it finds the &rgb_ug behavior locally first -- which
# requires this Kconfig on, and in turn requires a real (even if
# physically unwired) zmk,underglow chosen node, defined in
# Sofle_dongle_central.overlay on a spare pin (D0).
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y

### ZMK STUDIO CONFIGURATION
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n
CONFIG_ZMK_STUDIO_LOCK_ON_DISCONNECT=n

### POINTING DEVICE CONFIGURATION
CONFIG_ZMK_POINTING=y

### BLUETOOTH CONFIGURATION
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
CONFIG_ZMK_BLE_EXPERIMENTAL_FEATURES=y
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=6
CONFIG_BT_PERIPHERAL_PREF_LATENCY=0
CONFIG_ZMK_SPLIT_BLE_PREF_INT=6
CONFIG_ZMK_SPLIT_BLE_PREF_LATENCY=0
CONFIG_ZMK_KEYBOARD_NAME="PandaKB_Sofle"
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n

### PROSPECTOR CONFIGURATION
CONFIG_PROSPECTOR_USE_AMBIENT_LIGHT_SENSOR=n
CONFIG_PROSPECTOR_FIXED_BRIGHTNESS=38
CONFIG_PROSPECTOR_LAYER_ROLLER_ALL_CAPS=y