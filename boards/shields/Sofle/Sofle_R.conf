# RGB underglow
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=60
# Keep RGB state controlled by the global &rgb_ug behavior. AUTO_OFF_IDLE is local to each half and
# can leave the peripheral half out of sync after idle/deep sleep.
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=n

# OLED display
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=n
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
